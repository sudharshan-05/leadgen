# docker-compose.yml - Multi-container platform orchestration
version: "3.8"

services:
  # ──────────────────────────────────────────────────────────────
  # Database Service (PostgreSQL)
  # ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: lead_agent_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lead_agent
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lead_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Broker Service (Redis)
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lead_agent_redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Health & Status Monitoring API
  # ──────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: lead_agent_api
    restart: always
    command: python main.py --service api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lead_agent
      - REDIS_URL=redis://redis:6379/0
      - EXPORTS_FOLDER=/app/exports
    volumes:
      - exports_data:/app/exports
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────
  # Telegram Bot Client
  # ──────────────────────────────────────────────────────────────
  bot:
    build: .
    container_name: lead_agent_bot
    restart: always
    command: python main.py --service bot
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lead_agent
      - REDIS_URL=redis://redis:6379/0
      - EXPORTS_FOLDER=/app/exports
    volumes:
      - exports_data:/app/exports
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────
  # Asynchronous Task Queue Worker (Celery)
  # ──────────────────────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: lead_agent_worker
    restart: always
    # --concurrency=1: Playwright runs isolated. Never run >1 to avoid RAM spikes.
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lead_agent
      - REDIS_URL=redis://redis:6379/0
      - EXPORTS_FOLDER=/app/exports
    volumes:
      - exports_data:/app/exports
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────
  # APScheduler Campaign Service
  # ──────────────────────────────────────────────────────────────
  scheduler:
    build: .
    container_name: lead_agent_scheduler
    restart: always
    command: python main.py --service scheduler
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lead_agent
      - REDIS_URL=redis://redis:6379/0
      - EXPORTS_FOLDER=/app/exports
    volumes:
      - exports_data:/app/exports
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────
  # Self-Healing Autonomous Watchdog
  # ──────────────────────────────────────────────────────────────
  agent:
    build: .
    container_name: lead_agent_watchdog
    restart: always
    command: python main.py --service agent
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lead_agent
      - REDIS_URL=redis://redis:6379/0
      - EXPORTS_FOLDER=/app/exports
    volumes:
      - exports_data:/app/exports
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  exports_data:
  logs_data:
