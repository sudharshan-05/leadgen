# railway.toml - Railway.app deployment configuration
# This tells Railway how to build and run each service of the Lead Agent platform.
# Deploy instructions: https://railway.app/

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python main.py --service bot"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
