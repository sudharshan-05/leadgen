# railway.toml - Railway.app deployment configuration
# Each service in Railway should override the startCommand to match the Procfile entries.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Default service: Telegram Bot
# For Celery Worker service, override startCommand to:
#   celery -A workers.celery_app worker --loglevel=info --concurrency=1
startCommand = "python main.py --service bot"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[healthcheck]
# Railway will ping this path to check if the service is alive.
# The bot service uses TCP polling so we use a simple timeout check.
httpPath = "/"
timeoutSeconds = 30
